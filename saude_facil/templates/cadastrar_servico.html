<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Serviço - Saúde Fácil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f6f9; padding: 20px; color: #2c3e50; margin: 0;}
        .top-bar { background-color: #1e272e; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; margin: -20px -20px 30px -20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
        .container { max-width: 600px; margin: 40px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 5px solid #8e44ad;}
        h2.title { color: #2c3e50; margin-top: 0; border-bottom: 2px solid #ecf0f1; padding-bottom: 15px;}
        
        label { display: block; font-weight: bold; color: #34495e; margin: 20px 0 8px 0; font-size: 15px;}
        .input-icon { position: relative; }
        .input-icon i.fa-solid { position: absolute; left: 15px; top: 14px; color: #95a5a6; }
        input[type="text"], select { width: 100%; padding: 14px 14px 14px 45px; border: 2px solid #ecf0f1; border-radius: 8px; box-sizing: border-box; font-size: 15px; transition: 0.3s; background-color: #fbfcfc;}
        input[type="text"]:focus, select:focus { border-color: #8e44ad; outline: none; }
        
        button { width: 100%; padding: 16px; background-color: #8e44ad; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 30px; transition: 0.3s; }
        button:hover { background-color: #732d91; transform: translateY(-2px); }
        .sucesso { background-color: #d1fae5; color: #059669; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; text-align: center; border: 1px solid #34d399;}
    </style>
</head>
<body>
    <div class="top-bar">
        <h2><i class="fa-solid fa-chart-pie"></i> Painel Administrativo | <strong style="color: #8e44ad;">{{ nome }}</strong></h2>
    </div>

    <div class="container">
        <h2 class="title"><i class="fa-solid fa-notes-medical" style="color: #8e44ad;"></i> Adicionar Novo Serviço</h2>
        
        {% if mensagem %} <div class="sucesso"><i class="fa-solid fa-check-circle"></i> {{ mensagem }}</div> {% endif %}

        <form method="POST" action="/cadastrar_servico">
            <label>Nome do Serviço</label>
            <div class="input-icon">
                <i class="fa-solid fa-stethoscope"></i>
                <input type="text" name="nome" placeholder="Ex: Fisioterapia" required>
            </div>

            <label>Breve Descrição</label>
            <div class="input-icon">
                <i class="fa-solid fa-circle-info"></i>
                <input type="text" name="descricao" placeholder="Ex: Reabilitação motora" required>
            </div>

            <label>Escolha o Ícone Visual</label>
            <div class="input-icon">
                <i class="fa-solid fa-icons"></i>
                <select name="icone" required>
                    <option value="fa-user-doctor">👨‍⚕️ Médico (Geral)</option>
                    <option value="fa-tooth">🦷 Odontologia</option>
                    <option value="fa-brain">🧠 Psicologia / Psiquiatria</option>
                    <option value="fa-heart-pulse">❤️ Cardiologia</option>
                    <option value="fa-eye">👁️ Oftalmologia</option>
                    <option value="fa-baby">👶 Pediatria</option>
                    <option value="fa-crutch">🩼 Fisioterapia / Ortopedia</option>
                    <option value="fa-pills">💊 Farmácia</option>
                    <option value="fa-vial">🧪 Exames Laboratoriais</option>
                    <option value="fa-user-nurse">👩‍⚕️ Enfermagem</option>
                </select>
            </div>

            <button type="submit"><i class="fa-solid fa-plus-circle"></i> Gravar no Catálogo</button>
        </form>
        
        <a href="/painel_gestor" style="display: inline-block; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-weight: bold;"><i class="fa-solid fa-arrow-left"></i> Voltar ao Dashboard</a>
    </div>
</body>
</html>
