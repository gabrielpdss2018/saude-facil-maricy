<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Senha - Saúde Fácil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 380px; text-align: center; border-top: 5px solid #3498db; }
        .input-icon { position: relative; margin-top: 15px; }
        .input-icon i { position: absolute; left: 15px; top: 14px; color: #95a5a6; }
        input { width: 100%; padding: 12px 12px 12px 40px; border: 1px solid #dcdde1; border-radius: 8px; box-sizing: border-box; transition: 0.3s; background-color: #fcfcfc; font-size: 15px;}
        input:focus { border-color: #3498db; outline: none; }
        button { width: 100%; padding: 14px; background-color: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 25px; transition: 0.3s; }
        button:hover { background-color: #2980b9; transform: translateY(-2px); }
        .erro { background-color: #fee2e2; color: #dc2626; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; }
        .sucesso { background-color: #d1fae5; color: #059669; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; }
        .btn-voltar { display: block; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: #2c3e50; margin-top: 0;"><i class="fa-solid fa-key"></i> Recuperar Senha</h2>
        <p style="color: #7f8c8d; font-size: 14px;">Identificamos que você é um <strong>{{ tipo | capitalize }}</strong>.</p>
        
        {% if erro %} <div class="erro">{{ erro }}</div> {% endif %}
        {% if mensagem %} <div class="sucesso">{{ mensagem }}</div> {% endif %}

        <form method="POST" action="/recuperar_senha">
            <input type="hidden" name="tipo" value="{{ tipo }}">
            
            <div class="input-icon">
                <i class="fa-solid fa-user-check"></i>
                <input type="text" name="identificador" placeholder="{% if tipo == 'cidadao' %}CPF ou Cartão SUS{% else %}Login / Matrícula{% endif %}" required>
            </div>
            
            <div class="input-icon">
                <i class="fa-solid fa-lock-open"></i>
                <input type="password" name="nova_senha" placeholder="Digite a Nova Senha" required>
            </div>

            <button type="submit">Redefinir Senha</button>
        </form>

        <a href="{% if tipo == 'cidadao' %}/login{% elif tipo == 'servidor' %}/login_servidor{% else %}/login_gestor{% endif %}" class="btn-voltar">
            ⬅ Voltar para o Login
        </a>
    </div>
</body>
</html>
