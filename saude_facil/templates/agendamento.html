<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Agendamento - Saúde Fácil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/airbnb.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f4f8; padding: 20px; color: #2c3e50; }
        .nav-bar { background: linear-gradient(135deg, #1abc9c, #16a085); padding: 15px 30px; border-radius: 50px; margin: 0 auto 30px auto; display: flex; justify-content: space-between; align-items: center; max-width: 800px; box-shadow: 0 10px 20px rgba(26, 188, 156, 0.2); }
        .nav-bar .logo-user { color: white; font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 10px; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; font-weight: 600; font-size: 14px; padding: 8px 15px; border-radius: 20px; transition: 0.3s; }
        .nav-links a:hover { background-color: rgba(255,255,255,0.2); }
        .nav-links a.sair { background-color: #e74c3c; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3); }

        .container { background-color: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 800px; margin: 0 auto; }
        h2 { margin-top: 0; color: #2c3e50; font-size: 24px; border-bottom: 2px solid #ecf0f1; padding-bottom: 15px;}
        .form-group { margin-bottom: 25px; }
        label.main-label { display: block; margin-bottom: 10px; font-weight: 700; color: #34495e; font-size: 15px; }
        .input-icon { position: relative; }
        .input-icon i.icon-left { position: absolute; left: 15px; top: 15px; color: #95a5a6; }
        select, input.calendario { width: 100%; padding: 14px 14px 14px 45px; border: 2px solid #ecf0f1; border-radius: 10px; box-sizing: border-box; font-size: 15px; transition: 0.3s; background-color: #fbfcfc; cursor: pointer; color: #2c3e50; font-weight: 500; }
        select:focus, input:focus { border-color: #3498db; outline: none; }
        
        .servicos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .servico-label { cursor: pointer; }
        .servico-label input[type="radio"] { display: none; }
        .servico-card { border: 2px solid #ecf0f1; border-radius: 12px; padding: 20px 10px; text-align: center; transition: 0.3s; background: white; height: 100%; box-sizing: border-box;}
        .servico-card i { font-size: 35px; color: #bdc3c7; margin-bottom: 15px; transition: 0.3s; }
        .servico-card span { display: block; font-weight: 700; color: #2c3e50; margin-bottom: 5px;}
        .servico-card small { color: #7f8c8d; font-size: 12px; line-height: 1.3; display: block;}
        .servico-label:hover .servico-card { border-color: #3498db; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(52, 152, 219, 0.1); }
        .servico-label input[type="radio"]:checked + .servico-card { border-color: #1abc9c; background-color: #f0fdfa; box-shadow: 0 5px 15px rgba(26, 188, 156, 0.2); }
        .servico-label input[type="radio"]:checked + .servico-card i { color: #1abc9c; transform: scale(1.1); }

        .horarios-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 15px; }
        .btn-horario { background: white; border: 1px solid #2980b9; color: #2980b9; padding: 12px 5px; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.2s; text-align: center; }
        .btn-horario:hover { background-color: #ebf5fb; transform: scale(1.05); }
        .btn-horario.selected { background-color: #1a252f; color: white; border-color: #1a252f; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .input-escondido { opacity: 0; position: absolute; z-index: -1; width: 1px; height: 1px; }

        .btn-submit { width: 100%; padding: 16px; background-color: #3498db; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 30px; transition: 0.3s; box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3); }
        .btn-submit:hover { background-color: #2980b9; transform: translateY(-2px); }
        .vagas-badge { background-color: #e8f8f5; color: #16a085; padding: 12px 20px; border-radius: 10px; display: inline-block; font-weight: bold; margin-top: 15px; border: 2px solid #1abc9c; display: none; width: 100%; box-sizing: border-box; text-align: center;}
    </style>
</head>
<body>
    
    <div class="nav-bar">
        <div class="logo-user"><i class="fa-solid fa-circle-user" style="font-size: 30px;"></i> Olá, {{ nome }}</div>
        <div class="nav-links">
            <a href="/perfil"><i class="fa-solid fa-id-card"></i> Perfil</a>
            <a href="/meus_agendamentos"><i class="fa-solid fa-clock-rotate-left"></i> Histórico</a>
            <a href="/logout" class="sair"><i class="fa-solid fa-right-from-bracket"></i> Sair</a>
        </div>
    </div>

    <div class="container">
        <h2><i class="fa-solid fa-calendar-check" style="color: #3498db; margin-right: 10px;"></i> Agendar Atendimento</h2>
        
        <form method="POST" action="/agendamento" id="formAgendamento">
            
            <div class="form-group">
                <label class="main-label">1. Qual a sua Unidade Básica de Saúde (UBS)?</label>
                <div class="input-icon">
                    <i class="fa-solid fa-hospital icon-left"></i>
                    <select name="ubs_id" id="ubs" required>
                        <option value="">-- Selecione a Unidade --</option>
                        {% for u in ubs %}
                            <option value="{{ u['id'] }}">{{ u['nome'] }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="main-label">2. Qual o Serviço Necessário?</label>
                <div class="servicos-grid" id="servicos-container">
                    <div style="color: #95a5a6; font-style: italic; padding: 10px; grid-column: span 2;">
                        <i class="fa-solid fa-arrow-up"></i> Selecione a UBS acima para ver os serviços disponíveis nela.
                    </div>
                </div>
            </div>

            <div class="form-group" style="margin-top: 30px;">
                <label class="main-label">3. Escolha a Data no Calendário</label>
                <div class="input-icon">
                    <i class="fa-regular fa-calendar-days icon-left"></i>
                    <input type="text" name="data" id="data" class="calendario" placeholder="Clique para abrir o calendário..." required>
                </div>
                
                <div id="infoVagas" class="vagas-badge">
                    <i class="fa-solid fa-ticket"></i> <span id="textoVagas">Escolha a Data e o Serviço para ver as vagas.</span>
                </div>

                <div id="blocoHorarios" style="display: none; margin-top: 20px;">
                    <label class="main-label">4. Selecione o Horário</label>
                    <div class="horarios-grid" id="containerBotoesHorario"></div>
                    <input type="text" name="horario" id="horario_input" class="input-escondido" required>
                </div>
            </div>

            <button type="submit" class="btn-submit"><i class="fa-solid fa-check-circle"></i> Confirmar Agendamento</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/pt.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const ubsSelect = document.getElementById('ubs');
            const servicosContainer = document.getElementById('servicos-container');
            const dataInput = document.getElementById('data');
            const infoVagas = document.getElementById('infoVagas');
            const textoVagas = document.getElementById('textoVagas');
            const blocoHorarios = document.getElementById('blocoHorarios');
            const containerBotoes = document.getElementById('containerBotoesHorario');
            const horarioInput = document.getElementById('horario_input');
            
            let feriadosNacionais = [];

            try {
                const response = await fetch(`https://brasilapi.com.br/api/feriados/v1/${new Date().getFullYear()}`);
                const dataAPI = await response.json();
                feriadosNacionais = dataAPI.map(feriado => feriado.date);
            } catch (error) {}

            const calendario = flatpickr("#data", {
                locale: "pt", dateFormat: "Y-m-d", minDate: "today", altInput: true, altFormat: "d \\de F \\de Y",
                disable: [
                    function(date) { return (date.getDay() === 0 || date.getDay() === 6); },
                    function(date) { return feriadosNacionais.includes(date.toISOString().split('T')[0]); }
                ],
                onChange: checarVagas
            });

            ubsSelect.addEventListener('change', async function() {
                const ubs_id = this.value;
                servicosContainer.innerHTML = ''; 
                
                if (!ubs_id) {
                    servicosContainer.innerHTML = '<div style="color: #95a5a6; font-style: italic; padding: 10px; grid-column: span 2;"><i class="fa-solid fa-arrow-up"></i> Selecione a UBS acima para ver os serviços.</div>';
                    checarVagas();
                    return;
                }

                try {
                    const res = await fetch(`/api/servicos_por_ubs/${ubs_id}`);
                    const servicos = await res.json();
                    
                    if(servicos.length === 0){
                        servicosContainer.innerHTML = '<div style="color: #e74c3c; font-weight: bold;"><i class="fa-solid fa-circle-xmark"></i> Esta UBS não possui serviços cadastrados ainda.</div>';
                        return;
                    }

                    servicos.forEach(s => {
                        servicosContainer.innerHTML += `
                            <label class="servico-label">
                                <input type="radio" name="servico_id" value="${s.id}" required>
                                <div class="servico-card">
                                    <i class="fa-solid ${s.icone}"></i>
                                    <span>${s.nome}</span>
                                    <small>${s.descricao}</small>
                                </div>
                            </label>
                        `;
                    });
                } catch (error) {}
                checarVagas();
            });

            async function checarVagas() {
                const ubs_id = ubsSelect.value;
                const dataSelecionada = dataInput.value;

                if (!ubs_id || !dataSelecionada) {
                    blocoHorarios.style.display = 'none';
                    infoVagas.style.display = 'none';
                    horarioInput.value = '';
                    return;
                }

                try {
                    const res = await fetch('/api/horarios', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ data: dataSelecionada, ubs_id: ubs_id })
                    });
                    const result = await res.json();
                    
                    infoVagas.style.display = 'block';
                    horarioInput.value = ''; 
                    
                    if (result.vagas > 0) {
                        textoVagas.innerHTML = `${result.vagas} horários livres encontrados.`;
                        infoVagas.style.color = "#16a085"; infoVagas.style.borderColor = "#1abc9c"; infoVagas.style.backgroundColor = "#e8f8f5";
                        blocoHorarios.style.display = 'block';
                        containerBotoes.innerHTML = '';
                        
                        result.horarios.forEach(h => {
                            let btn = document.createElement('button');
                            btn.type = 'button'; btn.className = 'btn-horario'; btn.innerText = h;
                            btn.onclick = function() {
                                document.querySelectorAll('.btn-horario').forEach(b => b.classList.remove('selected'));
                                this.classList.add('selected');
                                horarioInput.value = h;
                            };
                            containerBotoes.appendChild(btn);
                        });
                    } else {
                        textoVagas.innerHTML = `Nenhum horário disponível para esta data.`;
                        infoVagas.style.color = "#c0392b"; infoVagas.style.borderColor = "#e74c3c"; infoVagas.style.backgroundColor = "#fdf2f2";
                        blocoHorarios.style.display = 'none';
                    }
                } catch (error) {}
            }
        });
    </script>
</body>
</html>
